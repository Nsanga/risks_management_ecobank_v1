name: Déploiement React

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: react-deploy-main
  cancel-in-progress: true

env:
  APP_NAME: risks_management_ecobank_v1

  # ✅ Mets "build" si Create React App, ou "dist" si Vite
  BUILD_DIR: build

  # ✅ PROD (main)
  DEPLOY_PATH: /var/www/frontend/risks_management_ecobank_v1

  # Dossier temporaire sur le serveur (staging)
  TEMP_PATH: /tmp/deploy-risks_management_ecobank_v1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25

    env:
      CI: "false"
      SSH_HOST: ${{ secrets.SERVER_IP }}
      SSH_USER: ${{ secrets.SERVER_USER }}
      SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SSH_PORT: ${{ secrets.SERVER_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js + cache npm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Créer le .env pour le build
        shell: bash
        run: |
          set -euo pipefail
          echo "REACT_APP_API_URL=${{ vars.REACT_APP_API_URL }}" > .env

      - name: Installer les dépendances (npm ci)
        shell: bash
        run: |
          set -euo pipefail
          npm ci

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          npm run build

      - name: Vérifier le dossier de build
        shell: bash
        run: |
          set -euo pipefail
          test -d "${BUILD_DIR}" || (echo "::error::Dossier ${BUILD_DIR} introuvable (mets BUILD_DIR=build ou dist)"; exit 1)
          ls -la "${BUILD_DIR}"

      - name: Vérification secrets SSH + port
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SSH_HOST:-}" || -z "${SSH_USER:-}" || -z "${SSH_KEY:-}" ]]; then
            echo "::error::Secrets SSH manquants (SERVER_IP, SERVER_USER, SERVER_SSH_KEY)."
            exit 1
          fi
          echo "SSH_PORT=${SSH_PORT:-22}" >> "$GITHUB_ENV"

      - name: Préparer SSH local (clé + known_hosts)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # clé multi-lignes OK
          echo "${SSH_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
          # fallback si le secret contient des \n littéraux
          if [[ "$(wc -l < ~/.ssh/id_rsa | tr -d ' ')" -lt 5 && "${SSH_KEY}" == *'\\n'* ]]; then
            printf '%b' "${SSH_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
          fi
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts || true

      - name: Préparer le serveur (staging + dossiers)
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          TEMP_PATH: ${{ env.TEMP_PATH }}
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          port: ${{ env.SSH_PORT }}
          key: ${{ env.SSH_KEY }}
          envs: DEPLOY_PATH,TEMP_PATH
          script: |
            set -euo pipefail
            sudo mkdir -p "$DEPLOY_PATH"
            sudo mkdir -p "$TEMP_PATH"
            sudo rm -rf "$TEMP_PATH"/*

      - name: Transférer le build vers le staging (rsync)
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -p $SSH_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            "${BUILD_DIR}/" \
            "${SSH_USER}@${SSH_HOST}:${TEMP_PATH}/"

      - name: Publier (remplacer le contenu prod) + reload nginx
        uses: appleboy/ssh-action@v1.2.2
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          TEMP_PATH: ${{ env.TEMP_PATH }}
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          port: ${{ env.SSH_PORT }}
          key: ${{ env.SSH_KEY }}
          envs: DEPLOY_PATH,TEMP_PATH
          script: |
            set -euo pipefail

            # Remplacement "propre" : on vide puis on copie depuis staging
            sudo rm -rf "$DEPLOY_PATH"/*
            sudo rsync -a --delete "$TEMP_PATH/" "$DEPLOY_PATH/"
            sudo rm -rf "$TEMP_PATH"

            sudo nginx -t
            sudo systemctl reload nginx

  notification:
    needs: deploy
    runs-on: ubuntu-latest
    environment: production
    if: always()
    env:
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
      SMTP_USER: ${{ vars.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ vars.SMTP_FROM }}
      SMTP_TO: ${{ vars.SMTP_TO }}

    steps:
      - name: Vérifier config SMTP (optionnel)
        id: smtp
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${SMTP_HOST:-}" && -n "${SMTP_PORT:-}" && -n "${SMTP_USER:-}" && -n "${SMTP_PASSWORD:-}" && -n "${SMTP_FROM:-}" && -n "${SMTP_TO:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email succès
        if: ${{ needs.deploy.result == 'success' && steps.smtp.outputs.enabled == 'true' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT }}
          secure: false
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASSWORD }}
          from: ${{ env.SMTP_FROM }}
          to: ${{ env.SMTP_TO }}
          subject: "[SUCCÈS] Déploiement : risks_management_ecobank_v1"
          body: |
            Déploiement OK : risks_management_ecobank_v1
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Run : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Email échec
        if: ${{ needs.deploy.result != 'success' && steps.smtp.outputs.enabled == 'true' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT }}
          secure: false
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASSWORD }}
          from: ${{ env.SMTP_FROM }}
          to: ${{ env.SMTP_TO }}
          subject: "[ÉCHEC] Déploiement : risks_management_ecobank_v1"
          body: |
            Déploiement KO : risks_management_ecobank_v1
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Run : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: SMTP manquant (notification ignorée)
        if: ${{ steps.smtp.outputs.enabled != 'true' }}
        shell: bash
        run: echo "::warning::Variables SMTP manquantes. Notification ignorée."