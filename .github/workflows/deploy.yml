name: Déploiement de l'application React

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: react-deploy-main
  cancel-in-progress: true

jobs:
  build-et-deploiement:
    runs-on: ubuntu-latest
    environment: Production
    env:
      CI: false

    steps:
      - name: Récupérer le code depuis le dépôt
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ✅ Cache npm manuel (fonctionne même sans package-lock.json)
      - name: Activer le cache npm (sans lockfile)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Créer un fichier .env localement pour le build
        shell: bash
        run: |
          set -euo pipefail
          echo "REACT_APP_API_URL=${{ vars.REACT_APP_API_URL }}" > .env

      - name: Installer les dépendances
        shell: bash
        run: |
          set -euo pipefail
          npm install

      - name: Construire l'application
        shell: bash
        run: |
          set -euo pipefail
          npm run build

      - name: Vérifier le contenu du dossier build local (GitHub)
        shell: bash
        run: |
          set -euo pipefail
          ls -la build

      - name: Vérification et création de la structure des dossiers sur le serveur
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail
            echo "=== Vérification de la structure des dossiers ==="

            sudo mkdir -p /var/www/frontend/risks_management_ecobank_v1

            echo "=== Préparation du dossier build ==="
            sudo rm -rf /var/www/frontend/risks_management_ecobank_v1/build
            sudo mkdir -p /var/www/frontend/risks_management_ecobank_v1/build

            echo "✓ Dossiers prêts"

      - name: Transférer le dossier build sur le serveur
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "build/"
          target: "/var/www/frontend/risks_management_ecobank_v1/build/"
          strip_components: 1

      - name: Vérifier nginx + redémarrer nginx
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail
            echo "=== Test de configuration nginx ==="
            sudo nginx -t
            echo "=== Reload nginx ==="
            sudo systemctl reload nginx
            echo "✓ Déploiement réussi !"

  notification:
    needs: build-et-deploiement
    runs-on: ubuntu-latest
    environment: Production
    if: always()
    env:
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
      SMTP_USER: ${{ vars.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ vars.SMTP_FROM }}
      SMTP_TO: ${{ vars.SMTP_TO }}

    steps:
      - name: Vérifier la configuration SMTP (optionnel)
        id: smtp
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${SMTP_HOST:-}" && -n "${SMTP_PORT:-}" && -n "${SMTP_USER:-}" && -n "${SMTP_PASSWORD:-}" && -n "${SMTP_FROM:-}" && -n "${SMTP_TO:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Envoyer email de succès
        if: ${{ needs.build-et-deploiement.result == 'success' && steps.smtp.outputs.enabled == 'true' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT }}
          secure: true
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASSWORD }}
          from: ${{ env.SMTP_FROM }}
          to: ${{ env.SMTP_TO }}
          subject: "🎉 Déploiement Futuriskmanagement réussi !"
          body: |
            🚀 Déploiement réussi.
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Run : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Envoyer email d'échec
        if: ${{ needs.build-et-deploiement.result != 'success' && steps.smtp.outputs.enabled == 'true' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT }}
          secure: true
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASSWORD }}
          from: ${{ env.SMTP_FROM }}
          to: ${{ env.SMTP_TO }}
          subject: "❌ Déploiement Futuriskmanagement échoué"
          body: |
            ⚠️ Déploiement en échec.
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Run : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: SMTP manquant (notification ignorée)
        if: ${{ steps.smtp.outputs.enabled != 'true' }}
        shell: bash
        run: echo "::warning::Variables SMTP manquantes. Notification ignorée."